<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CelebrationKart – Hero</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bacasime+Antique&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-title">Plan Your Perfect Wedding</h1>

                <div class="hero-marquee-wrap">
                    <span class="subtitle">
                        Plan Your Perfect Wedding Plan Your Perfect Wedding
                    </span>
                </div>

                <div class="search-card">
                    <!-- Vendor Category Select -->
                    <div class="custom-select" id="vendor-select">
                        <div
                            class="select-trigger"
                            onclick="toggleSelect('vendor-select')"
                        >
                            <span class="label placeholder" id="vendor-label"
                                >Search Vendors</span
                            >
                            <span class="arrow-icon"></span>
                        </div>
                        <div class="dropdown" id="vendor-dropdown">
                            <div class="dropdown-option" data-value="">
                                All Categories
                            </div>
                            <div class="dropdown-option" data-value="venue">
                                Wedding Venue
                            </div>
                            <div
                                class="dropdown-option"
                                data-value="photographer"
                            >
                                Wedding Photographer
                            </div>
                            <div class="dropdown-option" data-value="makeup">
                                Bridal Makeup Artist
                            </div>
                            <div
                                class="dropdown-option"
                                data-value="decorators"
                            >
                                Decorators
                            </div>
                            <div class="dropdown-option" data-value="caterers">
                                Caterers
                            </div>
                            <div class="dropdown-option" data-value="mehendi">
                                Mehendi Artist
                            </div>
                        </div>
                    </div>

                    <!-- City Select -->
                    <div class="custom-select" id="city-select">
                        <div
                            class="select-trigger"
                            onclick="toggleSelect('city-select')"
                        >
                            <span class="label placeholder" id="city-label"
                                >Wedding City</span
                            >
                            <span class="arrow-icon"></span>
                        </div>
                        <div class="dropdown" id="city-dropdown">
                            <div class="dropdown-option" data-value="">
                                All Categories
                            </div>
                            <div class="dropdown-option" data-value="jaipur">
                                Jaipur
                            </div>
                            <div class="dropdown-option" data-value="jodhpur">
                                Jodhpur
                            </div>
                            <div class="dropdown-option" data-value="kota">
                                Kota
                            </div>
                            <div class="dropdown-option" data-value="bikaner">
                                Bikaner
                            </div>
                        </div>
                    </div>

                    <button class="btn-search" onclick="handleSearch()">
                        Search Vendors
                    </button>
                </div>
            </div>
        </section>

        <script>
            // Track selected values
            const state = { vendor: "", city: "" };

            function getSearchResultsUrl(params = {}) {
                const base = window.location.pathname.includes("/pages/")
                    ? "./searchResults.html"
                    : "./pages/searchResults.html";
                const url = new URL(base, window.location.href);
                Object.entries(params).forEach(([key, value]) => {
                    if (value) {
                        url.searchParams.set(key, value);
                    }
                });
                return url.toString();
            }

            function toggleSelect(id) {
                const el = document.getElementById(id);
                const isOpen = el.classList.contains("open");

                // Close all
                document
                    .querySelectorAll(".custom-select")
                    .forEach((s) => s.classList.remove("open"));

                // Toggle clicked
                if (!isOpen) el.classList.add("open");
            }

            // Close dropdowns on outside click
            document.addEventListener("click", (e) => {
                if (!e.target.closest(".custom-select")) {
                    document
                        .querySelectorAll(".custom-select")
                        .forEach((s) => s.classList.remove("open"));
                }
            });

            // Option selection
            document.querySelectorAll(".dropdown-option").forEach((opt) => {
                opt.addEventListener("click", function () {
                    const selectEl = this.closest(".custom-select");
                    const id = selectEl.id;
                    const value = this.dataset.value;
                    const text = this.textContent.trim();

                    // Mark selected
                    selectEl
                        .querySelectorAll(".dropdown-option")
                        .forEach((o) => o.classList.remove("selected"));
                    this.classList.add("selected");

                    // Update label
                    if (id === "vendor-select") {
                        state.vendor = value;
                        const lbl = document.getElementById("vendor-label");
                        lbl.textContent = text || "Search Vendors";
                        lbl.classList.toggle("placeholder", !value);
                    } else {
                        state.city = value;
                        const lbl = document.getElementById("city-label");
                        lbl.textContent = text || "Wedding City";
                        lbl.classList.toggle("placeholder", !value);
                    }

                    // Close dropdown
                    selectEl.classList.remove("open");
                });
            });

            function handleSearch() {
                const vendor = state.vendor || "all";
                const city = state.city || "all";
                window.location.href = getSearchResultsUrl({ vendor, city });
            }
        </script>
    </body>
</html>
