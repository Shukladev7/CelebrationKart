<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vendor Card</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Montserrat", sans-serif;
                background: #f5f2ee;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 40px;
            }

            /* ── OUTER CARD ── */
            .vendor-card {
                width: 408px;
                height: 373px;
                background: #ffffff;
                border-radius: 14px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                flex-shrink: 0;
            }

            /* ── IMAGE WRAPPER ── */
            .card-image-wrap {
                position: relative;
                padding: 16px 16px 0 16px;
                flex-shrink: 0;
            }

            .card-img {
                width: 100%;
                height: 200px;
                object-fit: cover;
                border-radius: 14px;
                display: block;
                background: #e8e2f0;
            }

            /* ── HEART BUTTON ── */
            .heart-btn {
                position: absolute;
                top: 26px;
                right: 26px;
                width: 36px;
                height: 36px;
                background: rgba(255, 255, 255, 0.92);
                border-radius: 50%;
                border: none;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: background 0.2s;
                padding: 0;
            }

            .heart-btn svg {
                width: 18px;
                height: 18px;
                transition:
                    fill 0.2s,
                    stroke 0.2s;
            }

            /* Default: outline heart */
            .heart-btn .heart-outline {
                display: block;
            }
            .heart-btn .heart-filled {
                display: none;
            }

            /* Hover: filled heart */
            .heart-btn:hover .heart-outline {
                display: none;
            }
            .heart-btn:hover .heart-filled {
                display: block;
            }

            .heart-btn:hover {
                background: rgba(255, 255, 255, 1);
            }

            /* ── CARD BODY ── */
            .card-body {
                padding: 12px 16px 0 16px;
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            /* Name + Price row */
            .card-row-main {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 8px;
            }

            .card-name {
                font-size: 15px;
                font-weight: 600;
                color: #000000;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 55%;
            }

            .card-price {
                font-size: 14px;
                font-weight: 600;
                color: #000000;
                white-space: nowrap;
                text-align: right;
            }

            /* Location + Type row */
            .card-row-sub {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-top: 3px;
            }

            .card-location {
                font-size: 12.5px;
                font-weight: 400;
                color: #555555;
            }

            .card-type {
                font-size: 12.5px;
                font-weight: 400;
                color: #555555;
            }

            /* Rating row */
            .card-rating {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-top: 6px;
                font-size: 13px;
                font-weight: 500;
                color: #000000;
            }

            .card-rating .reviews {
                font-weight: 400;
                color: #666;
                font-size: 12.5px;
            }

            /* ── BUTTONS ROW ── */
            .card-actions {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px 14px 16px;
                margin-top: auto;
            }

            /* Send Enquiry — outline */
            .btn-enquiry {
                width: 146px;
                height: 36px;
                padding: 10px 25px;
                border-radius: 6px;
                border: 1.5px solid #320c35;
                background: #ffffff;
                color: #320c35;
                font-family: "Montserrat", sans-serif;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                white-space: nowrap;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    color 0.2s;
            }

            .btn-enquiry:hover {
                background: #320c35;
                color: #ffffff;
            }

            /* View Details — filled */
            .btn-details {
                flex: 1;
                height: 36px;
                padding: 10px 63px;
                border-radius: 6px;
                border: 1.5px solid #320c35;
                background: #320c35;
                color: #ffffff;
                font-family: "Montserrat", sans-serif;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                white-space: nowrap;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.2s,
                    color 0.2s;
            }

            .btn-details:hover {
                background: #ffffff;
                color: #320c35;
            }
        </style>
    </head>
    <body>
        <div class="vendor-card">
            <!-- Image -->
            <div class="card-image-wrap">
                <img
                    class="card-img"
                    src="/assets/main-card.jpg"
                    alt="Royal Weddingz"
                />

                <!-- Heart toggle -->
                <button class="heart-btn" id="heartBtn" aria-label="Shortlist">
                    <!-- Outline heart (default) -->
                    <svg
                        class="heart-outline"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#320C35"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                        />
                    </svg>
                    <!-- Filled heart (hover / active) -->
                    <svg
                        class="heart-filled"
                        viewBox="0 0 24 24"
                        fill="#320C35"
                        stroke="#320C35"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                        />
                    </svg>
                </button>
            </div>

            <!-- Body -->
            <div class="card-body">
                <div class="card-row-main">
                    <span class="card-name">Royal Weddingz by...</span>
                    <span class="card-price">₹35,00,000</span>
                </div>

                <div class="card-row-sub">
                    <span class="card-location">Jaipur, Rajasthan</span>
                    <span class="card-type">Outdoor</span>
                </div>

                <div class="card-rating">
                    ⭐ 4.9
                    <span class="reviews">90 Reviews</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="card-actions">
                <button class="btn-enquiry">Send Enquiry</button>
                <button class="btn-details">View Details</button>
            </div>
        </div>

        <script>
            // Toggle heart on click (persists filled state)
            const heartBtn = document.getElementById("heartBtn");
            let liked = false;

            heartBtn.addEventListener("click", () => {
                liked = !liked;
                heartBtn.querySelector(".heart-outline").style.display = liked
                    ? "none"
                    : "";
                heartBtn.querySelector(".heart-filled").style.display = liked
                    ? "block"
                    : "";
            });

            // On mouseout, restore to liked state
            heartBtn.addEventListener("mouseleave", () => {
                heartBtn.querySelector(".heart-outline").style.display = liked
                    ? "none"
                    : "";
                heartBtn.querySelector(".heart-filled").style.display = liked
                    ? "block"
                    : "";
            });
        </script>
    </body>
</html>
