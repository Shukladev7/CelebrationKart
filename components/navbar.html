<head>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", sans-serif;
            min-height: 100vh;
        }

        :root {
            --container-max: 1200px;
            --container-padding: 20px;
        }

        /* ── NAVBAR ── */
        nav {
            background: #320c35;
            min-height: 64px;
            display: flex;
            justify-content: center;
            padding: 0 var(--container-padding);
        }

        .nav-inner {
            width: min(100%, var(--container-max));
            min-height: 64px;
            display: flex;
            align-items: center;
        }

        /* ── LOGO ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
            margin-right: 40px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: "Bacasime Antique", serif;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* ── SEARCH BAR ── */
        .search-bar {
            flex: 1;
            max-width: 560px;
            position: relative;
            margin-right: auto;
        }

        .search-bar input {
            width: 100%;
            height: 40px;
            background: white;
            border: none;
            border-radius: 18px;
            padding: 0 20px 0 40px;
            font-size: 14px;
            font-weight: 200;
            color: hsla(296, 63%, 13%, 73%);
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-bar input::placeholder {
            color: #320c35;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: hsla(296, 63%, 13%, 65%);
            display: flex;
            align-items: center;
        }

        /* ── NAV LINKS ── */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 40px;
            flex-shrink: 0;
        }

        .mobile-search-trigger,
        .mobile-search-overlay {
            display: none;
        }

        .nav-link {
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            white-space: nowrap;
            position: relative;
            letter-spacing: 0.1px;
        }

        /* Underline element */
        .nav-link::after {
            content: "";
            position: absolute;
            bottom: 0px;
            left: 10px;
            right: 10px;
            height: 1.5px;
            background: #ffffff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.22s ease;
        }

        /* Active link — always underlined */
        .nav-link.active::after {
            transform: scaleX(1);
        }

        /* Hover — bold + underline slides in */
        .nav-link:hover {
            font-weight: 600;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        .divider {
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            padding: 0 4px;
            user-select: none;
            font-weight: 300;
        }

        .mobile-search-trigger {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition:
                background 0.2s ease,
                transform 0.2s ease;
        }

        .mobile-search-trigger:active {
            transform: scale(0.96);
        }

        .mobile-search-trigger svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .mobile-search-overlay {
            position: fixed;
            inset: 0;
            z-index: 1500;
            background:
                linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0.98) 0%,
                    rgba(248, 245, 250, 0.98) 100%
                );
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition:
                opacity 0.28s ease,
                visibility 0.28s ease;
        }

        .mobile-search-overlay.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .mobile-search-sheet {
            width: 100%;
            min-height: 100%;
            padding: 18px 16px 24px;
            transform: translateY(-18px);
            transition: transform 0.3s ease;
        }

        .mobile-search-overlay.is-open .mobile-search-sheet {
            transform: translateY(0);
        }

        .mobile-search-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mobile-search-close {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: #f0eaf3;
            color: #320c35;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .mobile-search-close svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .mobile-search-field {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 56px;
            border: 1px solid #e3dbe7;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 14px 34px rgba(50, 12, 53, 0.08);
            padding: 0 16px;
        }

        .mobile-search-field svg {
            width: 20px;
            height: 20px;
            color: #7f6b84;
            stroke: currentColor;
            flex-shrink: 0;
        }

        .mobile-search-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: #2d1230;
            font-family: "Montserrat", sans-serif;
        }

        .mobile-search-input::placeholder {
            color: #9f91a5;
        }

        .mobile-search-copy {
            margin-top: 22px;
            padding-left: 4px;
        }

        .mobile-search-copy h3 {
            margin: 0 0 6px;
            font-size: 16px;
            font-weight: 600;
            color: #320c35;
        }

        .mobile-search-copy p {
            margin: 0;
            font-size: 12px;
            line-height: 1.55;
            color: #6d6170;
        }

        @media (max-width: 768px) {
            :root {
                --container-padding: 16px;
            }

            nav {
                padding-top: 0;
                padding-bottom: 0;
                min-height: 56px;
            }

            .nav-inner {
                min-height: 56px;
                justify-content: center;
                position: relative;
            }

            .logo {
                margin-right: 0;
            }

            .search-bar {
                display: none;
            }

            .nav-links {
                display: none;
            }

            .mobile-search-trigger {
                display: none;
            }

            .mobile-search-overlay {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 18px;
            }

            .mobile-search-input {
                font-size: 14px;
            }

            .mobile-search-copy h3 {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <!-- Logo -->
            <a href="/" class="logo">
                <img src="../assets/logo-white.png" />
                <span class="logo-text">CelebrationKart</span>
            </a>

            <!-- Search bar -->
            <div class="search-bar">
                <span class="search-icon">
                    <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
                <input type="text" placeholder="Search" />
            </div>

            <!-- Nav links -->
            <div class="nav-links">
                <a href="#" class="nav-link active" id="link-vendors"
                    >Vendors</a
                >
                <a href="#" class="nav-link" id="link-login">Login</a>
                <span class="divider">|</span>
                <a href="#" class="nav-link" id="link-vendor-login"
                    >Log in as a Vendor</a
                >
            </div>

            <button
                class="mobile-search-trigger"
                type="button"
                aria-label="Open search"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-search-overlay" aria-hidden="true">
        <div class="mobile-search-sheet">
            <div class="mobile-search-topbar">
                <button
                    class="mobile-search-close"
                    type="button"
                    aria-label="Close search"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>

                <label class="mobile-search-field" for="mobile-search-input">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input
                        id="mobile-search-input"
                        class="mobile-search-input"
                        type="text"
                        placeholder="Search vendors, venues, makeup artists..."
                        autocomplete="off"
                    />
                </label>
            </div>

            <div class="mobile-search-copy">
                <h3>Find the right celebration partner</h3>
                <p>
                    Search instantly across venues, planners, photographers and
                    more.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Active link switching on click
        document.querySelectorAll(".nav-link").forEach((link) => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                document
                    .querySelectorAll(".nav-link")
                    .forEach((l) => l.classList.remove("active"));
                link.classList.add("active");
            });
        });

        const mobileSearchTrigger = document.querySelector(
            ".mobile-search-trigger",
        );
        const mobileSearchOverlay = document.querySelector(
            ".mobile-search-overlay",
        );
        const mobileSearchClose = document.querySelector(".mobile-search-close");
        const mobileSearchInput = document.querySelector(".mobile-search-input");
        const desktopSearchInput = document.querySelector(".search-bar input");

        function isMobileSearchMode() {
            return window.matchMedia("(max-width: 768px)").matches;
        }

        function openMobileSearch() {
            if (!mobileSearchOverlay || !isMobileSearchMode()) {
                return;
            }

            if (desktopSearchInput && mobileSearchInput) {
                mobileSearchInput.value = desktopSearchInput.value;
            }

            mobileSearchOverlay.classList.add("is-open");
            mobileSearchOverlay.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";

            window.requestAnimationFrame(() => {
                mobileSearchInput?.focus();
                mobileSearchInput?.select();
            });
        }

        function closeMobileSearch() {
            if (!mobileSearchOverlay) {
                return;
            }

            mobileSearchOverlay.classList.remove("is-open");
            mobileSearchOverlay.setAttribute("aria-hidden", "true");
            document.body.style.overflow = "";
        }

        mobileSearchTrigger?.addEventListener("click", openMobileSearch);
        mobileSearchClose?.addEventListener("click", closeMobileSearch);

        document
            .querySelectorAll("[data-open-mobile-search]")
            .forEach((trigger) => {
                trigger.addEventListener("click", (event) => {
                    event.preventDefault();
                    openMobileSearch();
                });
            });

        mobileSearchOverlay?.addEventListener("click", (event) => {
            if (event.target === mobileSearchOverlay) {
                closeMobileSearch();
            }
        });

        mobileSearchInput?.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeMobileSearch();
                return;
            }

            if (event.key !== "Enter" || !desktopSearchInput) {
                return;
            }

            desktopSearchInput.value = mobileSearchInput.value.trim();
            desktopSearchInput.dispatchEvent(
                new KeyboardEvent("keydown", {
                    key: "Enter",
                    bubbles: true,
                }),
            );
            closeMobileSearch();
        });

        window.addEventListener("resize", () => {
            if (!isMobileSearchMode()) {
                closeMobileSearch();
            }
        });
    </script>
</body>
