<head>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", sans-serif;
            min-height: 100vh;
        }

        :root {
            --container-max: 1200px;
            --container-padding: 20px;
        }

        /* ── NAVBAR ── */
        nav {
            background: #320c35;
            min-height: 64px;
            display: flex;
            justify-content: center;
            padding: 0 var(--container-padding);
        }

        .nav-inner {
            width: min(100%, var(--container-max));
            min-height: 64px;
            display: flex;
            align-items: center;
        }

        /* ── LOGO ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
            margin-right: 40px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: "Bacasime Antique", serif;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* ── SEARCH BAR ── */
        .search-bar {
            flex: 1;
            max-width: 560px;
            position: relative;
            margin-right: auto;
        }

        .search-bar input {
            width: 100%;
            height: 40px;
            background: white;
            border: none;
            border-radius: 18px;
            padding: 0 20px 0 40px;
            font-size: 14px;
            font-weight: 200;
            color: hsla(296, 63%, 13%, 73%);
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-bar input::placeholder {
            color: #320c35;
        }

        .search-bar input:focus {
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: hsla(296, 63%, 13%, 65%);
            display: flex;
            align-items: center;
        }

        /* ── NAV LINKS ── */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 40px;
            flex-shrink: 0;
        }

        .nav-link {
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            white-space: nowrap;
            position: relative;
            letter-spacing: 0.1px;
        }

        /* Underline element */
        .nav-link::after {
            content: "";
            position: absolute;
            bottom: 0px;
            left: 10px;
            right: 10px;
            height: 1.5px;
            background: #ffffff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.22s ease;
        }

        /* Active link — always underlined */
        .nav-link.active::after {
            transform: scaleX(1);
        }

        /* Hover — bold + underline slides in */
        .nav-link:hover {
            font-weight: 600;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        .divider {
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            padding: 0 4px;
            user-select: none;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            :root {
                --container-padding: 16px;
            }

            nav {
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .nav-inner {
                min-height: auto;
                flex-wrap: wrap;
                gap: 16px;
            }

            .logo {
                margin-right: 0;
            }

            .search-bar {
                order: 3;
                width: 100%;
                max-width: none;
            }

            .nav-links {
                margin-left: auto;
                gap: 12px;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <!-- Logo -->
            <a href="/" class="logo">
                <img src="../assets/logo-white.png" />
                <span class="logo-text">CelebrationKart</span>
            </a>

            <!-- Search bar -->
            <div class="search-bar">
                <span class="search-icon">
                    <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
                <input type="text" placeholder="Search" />
            </div>

            <!-- Nav links -->
            <div class="nav-links">
                <a href="#" class="nav-link active" id="link-vendors"
                    >Vendors</a
                >
                <a href="#" class="nav-link" id="link-login">Login</a>
                <span class="divider">|</span>
                <a href="#" class="nav-link" id="link-vendor-login"
                    >Log in as a Vendor</a
                >
            </div>
        </div>
    </nav>

    <script>
        // Active link switching on click
        document.querySelectorAll(".nav-link").forEach((link) => {
            link.addEventListener("click", (e) => {
                e.preventDefault();
                document
                    .querySelectorAll(".nav-link")
                    .forEach((l) => l.classList.remove("active"));
                link.classList.add("active");
            });
        });
    </script>
</body>
