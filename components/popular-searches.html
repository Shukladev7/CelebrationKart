<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Popular Searches</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Montserrat", sans-serif;
                background: #f5f2ee;
            }
        </style>
    </head>
    <body>
        <section class="popular-searches">
            <div class="section-header">
                <h2 class="section-title">Popular Searches</h2>
                <span class="view-all">View All</span>
            </div>

            <div class="cards-grid">
                <!-- Card 1 — odd image (IMAGE_ODD_1) -->
                <div class="card">
                    <img
                        class="card-img"
                        src="/assets/makeup-artists.jpg"
                        alt="Makeup Artists"
                    />
                    <p class="card-label">Makeup Artists</p>
                </div>

                <!-- Card 2 — even image (IMAGE_EVEN_1) -->
                <div class="card">
                    <img
                        class="card-img"
                        src="/assets/photographer.jpg"
                        alt="Photographer"
                    />
                    <p class="card-label">Photographer</p>
                </div>

                <!-- Card 3 — odd image (IMAGE_ODD_1 repeated) -->
                <div class="card">
                    <img
                        class="card-img"
                        src="/assets/makeup-artists.jpg"
                        alt="Makeup Artists"
                    />
                    <p class="card-label">Makeup Artists</p>
                </div>

                <!-- Card 4 — even image (IMAGE_EVEN_1 repeated) -->
                <div class="card">
                    <img
                        class="card-img"
                        src="/assets/photographer.jpg"
                        alt="Photographer"
                    />
                    <p class="card-label">Photographer</p>
                </div>
            </div>
        </section>
    </body>
</html>
