<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #eeeee6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 52px 52px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e0e0d8;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
    }

    input:focus {
      border-color: #b0b0a4;
    }

    .password-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .forgot-link {
      font-size: 13px;
      color: #555;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }

    .hide-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
      font-weight: 500;
      user-select: none;
    }

    .password-input-row {
      position: relative;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
    }

    .divider-line {
      flex: 1;
      height: 1.5px;
      background: #e0e0d8;
    }

    .divider-text {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
    }

    /* Social buttons */
    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 16px;
      border: 1.5px solid #e0e0d8;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }

    .social-btn:hover {
      background: #f7f7f2;
      border-color: #c0c0b8;
    }

    .social-icon {
      width: 20px;
      height: 20px;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 8px;
    }

    .login-btn {
      background: #c5c5bb;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 40px;
      padding: 16px 40px;
      cursor: pointer;
      transition: background 0.18s;
      white-space: nowrap;
    }

    .login-btn:hover {
      background: #a8a89f;
    }

    .signup-text {
      font-size: 14px;
      color: #555;
    }

    .signup-text a {
      color: #1a1a1a;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your account to continue</p>

    <div class="field">
      <label>Email address</label>
      <input type="email" placeholder="" />
    </div>

    <div class="field">
      <div class="password-label-row">
        <label>Password</label>
        <span class="forgot-link">Forgot password?</span>
      </div>
      <div class="password-input-row">
        <input type="password" id="passwordInput" placeholder="" style="padding-right: 80px;" />
        <span class="toggle-pw" onclick="togglePassword(this)">
          <span>👁</span> Show
        </span>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-btns">
      <button class="social-btn">
        <!-- Google -->
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn">
        <!-- Apple -->
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
        </svg>
        Facebook
      </button>
    </div>

    <div class="bottom-row">
      <button class="login-btn">Log in</button>
      <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </div>

  <script>
    function togglePassword(btn) {
      const input = document.getElementById('passwordInput');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? '<span>👁</span> Hide'
        : '<span>👁</span> Show';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const signupLink = document.querySelector('.signup-text a');
      if (!signupLink) return;

      signupLink.addEventListener('click', (event) => {
        event.preventDefault();
        window.location.href = './signup.html';
      });
    });
  </script>
</body>
</html>
